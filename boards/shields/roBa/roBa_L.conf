CONFIG_NFCT_PINS_AS_GPIOS=y

# +8dBm de volta (2026-07-10) — margem pro link split em ambiente ruidoso
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Deep sleep: só dorme após 2h parado (7200000 ms) — igual à metade direita
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

CONFIG_EC11=y
# Thread dedicada pro encoder: na thread global, transições se perdiam sob carga BLE
CONFIG_EC11_TRIGGER_OWN_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_POINTING=y

