CONFIG_ZMK_KEYBOARD_NAME="roBa"

CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y

# Estabilidade de conexão BLE (parâmetros que serão default em versões futuras)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Rádio a +8dBm (default 0dBm): sinal mais forte, menos pacote perdido.
# Custo: ~10-20% de autonomia.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Latência de conexão 0 (default ZMK: 30): não pula janelas de conexão.
# Cura lag intermitente do ponteiro que resolvia só reconectando. Custo: bateria.
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# Deep sleep: só dorme após 2h parado (7200000 ms) — economiza bateria à noite
# sem dormir em pausas do dia. Acorda com qualquer tecla.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y



CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=800
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=y
# CONFIG_PMW3610_SNIPE_CPI=800
# CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=4
CONFIG_PMW3610_SCROLL_TICK=16
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
#CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=9600
#CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST3_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_FORCE_AWAKE=n
# 250Hz enchia a fila BLE (janela ~15ms do macOS) e dava input lag no BT;
# no cabo USB era liso. 125 hardware = melhor caso pro Bluetooth.
CONFIG_PMW3610_POLLING_RATE_125=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=300

CONFIG_PMW3610_MOVEMENT_THRESHOLD=0

CONFIG_PMW3610_SMART_ALGORITHM=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# NKRO: rollover ilimitado (default reporta max 6 teclas simultâneas)
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
